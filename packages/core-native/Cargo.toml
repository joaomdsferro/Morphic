[package]
name = "morphic-core-native"
version = "0.0.1"
edition = "2021"
description = "Morphic core processing logic for native (Tauri) targets"

[lib]
name = "morphic_core_native"

[dependencies]
serde = { version = "1", features = ["derive"] }
# Image processing
image = { version = "0.25", default-features = false, features = ["jpeg", "png", "webp", "avif", "rayon"] }
ravif = "0.11"
jxl-oxide = "0.10"
# Parallel processing
rayon = "1.10"
# Error handling
thiserror = "2"
